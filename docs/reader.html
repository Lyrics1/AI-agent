<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>加载中… · AI Notes</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<style>
  :root {
    --bg: #fafbfc; --panel: #ffffff; --text: #24292f; --muted: #57606a;
    --border: #d0d7de; --primary: #0969da; --primary-soft: #ddf4ff;
    --accent: #1f883d; --code-bg: #f6f8fa;
    --shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue",
                 "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", sans-serif;
    font-size: 16px; line-height: 1.75; -webkit-font-smoothing: antialiased;
  }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  }
  .topbar a.home {
    color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 600;
  }
  .topbar a.home:hover { text-decoration: underline; }
  .topbar .crumb { color: var(--muted); font-size: 13px; }

  .layout {
    display: grid; grid-template-columns: 260px 1fr;
    max-width: 1280px; margin: 0 auto; gap: 32px; padding: 28px 24px;
  }
  aside {
    position: sticky; top: 78px; align-self: start;
    max-height: calc(100vh - 100px); overflow-y: auto;
    padding: 20px 18px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px;
    box-shadow: var(--shadow); font-size: 14px;
  }
  aside .toc-title {
    font-weight: 600; margin-bottom: 12px; font-size: 13px;
    letter-spacing: .5px; text-transform: uppercase; color: var(--muted);
  }
  aside ul { list-style: none; padding: 0; margin: 0; }
  aside li { margin: 4px 0; }
  aside a {
    display: block; padding: 5px 10px; color: var(--text);
    text-decoration: none; border-radius: 6px;
    border-left: 2px solid transparent; transition: all .15s ease; line-height: 1.4;
  }
  aside a:hover { background: var(--primary-soft); color: var(--primary); }
  aside a.active {
    background: var(--primary-soft); color: var(--primary);
    border-left-color: var(--primary); font-weight: 600;
  }
  aside a.lv-3 { padding-left: 22px; font-size: 13px; color: var(--muted); }
  aside a.lv-4 { padding-left: 34px; font-size: 12px; color: var(--muted); }

  main {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 44px 52px;
    box-shadow: var(--shadow); min-width: 0;
  }

  h1, h2, h3, h4 { scroll-margin-top: 90px; line-height: 1.3; }
  h1 { font-size: 32px; font-weight: 700; margin: 0 0 8px; padding-bottom: 16px; border-bottom: 2px solid var(--border); }
  h2 { font-size: 24px; font-weight: 700; margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  h3 { font-size: 19px; font-weight: 600; margin: 28px 0 12px; }
  h4 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; color: var(--muted); }
  p { margin: 12px 0; }
  strong { color: #0a3069; font-weight: 600; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
  blockquote {
    margin: 16px 0; padding: 12px 18px; background: #f6f8fa;
    border-left: 4px solid var(--primary); border-radius: 0 6px 6px 0;
  }
  blockquote p { margin: 4px 0; }
  blockquote strong { color: var(--primary); }
  ul, ol { padding-left: 28px; margin: 12px 0; }
  li { margin: 4px 0; }
  code {
    font-family: "SF Mono", Monaco, Menlo, Consolas, monospace; font-size: 13.5px;
    background: var(--code-bg); color: #cf222e; padding: 2px 6px; border-radius: 4px;
  }
  pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 18px; overflow-x: auto; margin: 14px 0; line-height: 1.55;
  }
  pre code { background: transparent; color: inherit; padding: 0; border-radius: 0; font-size: 13.5px; }
  table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 14.5px; }
  th, td { border: 1px solid var(--border); padding: 9px 14px; text-align: left; vertical-align: top; }
  th { background: #f6f8fa; font-weight: 600; }
  tr:nth-child(even) td { background: #fafbfc; }
  hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  img { max-width: 100%; border-radius: 6px; }

  .state { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 15px; }
  .state.err { color: #b91c1c; }

  aside::-webkit-scrollbar { width: 6px; }
  aside::-webkit-scrollbar-thumb { background: #c0c7d0; border-radius: 3px; }
  pre::-webkit-scrollbar { height: 8px; }
  pre::-webkit-scrollbar-thumb { background: #c0c7d0; border-radius: 4px; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
    aside { position: static; max-height: none; }
    main { padding: 24px 18px; }
    h1 { font-size: 26px; } h2 { font-size: 20px; }
  }

  #to-top {
    position: fixed; right: 24px; bottom: 24px; width: 42px; height: 42px;
    border-radius: 50%; background: var(--primary); color: #fff; border: none;
    cursor: pointer; box-shadow: 0 4px 12px rgba(9,105,218,.35);
    font-size: 18px; display: none; z-index: 100;
  }
  #to-top:hover { background: #0860c7; }
</style>
</head>
<body>

<div class="topbar">
  <a class="home" href="../index.html">← 返回首页</a>
  <span class="crumb" id="crumb"></span>
</div>

<div class="layout">
  <aside>
    <div class="toc-title">目录</div>
    <ul id="toc"></ul>
  </aside>
  <main>
    <div class="state" id="state">正在加载文档…</div>
    <article id="content"></article>
  </main>
</div>

<button id="to-top" title="回到顶部">↑</button>

<script>
  /* ===== 1. 解析要加载的文档 ===== */
  const params = new URLSearchParams(location.search);
  const docName = params.get("doc");
  const stateEl = document.getElementById("state");
  const contentEl = document.getElementById("content");
  const crumbEl = document.getElementById("crumb");

  marked.setOptions({
    breaks: false, gfm: true,
    highlight: (code, lang) =>
      (lang && hljs.getLanguage(lang))
        ? hljs.highlight(code, { language: lang }).value
        : hljs.highlightAuto(code).value
  });

  function slugify(text, store) {
    let s = text.trim().toLowerCase()
      .replace(/[\s\u3000]+/g, "-")
      .replace(/[^\w\u4e00-\u9fa5\-]/g, "");
    if (store[s] !== undefined) { store[s]++; s = `${s}-${store[s]}`; }
    else { store[s] = 0; }
    return s;
  }

  function buildToc() {
    const slugCount = {};
    const headings = contentEl.querySelectorAll("h2, h3, h4");
    const tocEl = document.getElementById("toc");
    if (!headings.length) { tocEl.innerHTML = '<li style="color:#999;font-size:13px">（无小节）</li>'; return; }
    headings.forEach(h => {
      const id = slugify(h.textContent, slugCount);
      h.id = id;
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = `#${id}`;
      a.textContent = h.textContent;
      a.className = `lv-${h.tagName.charAt(1)}`;
      li.appendChild(a);
      tocEl.appendChild(li);
    });

    const tocLinks = tocEl.querySelectorAll("a");
    const idToLink = {};
    tocLinks.forEach(a => idToLink[a.getAttribute("href").slice(1)] = a);
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const link = idToLink[entry.target.id];
        if (link && entry.isIntersecting) {
          tocLinks.forEach(l => l.classList.remove("active"));
          link.classList.add("active");
        }
      });
    }, { rootMargin: "-15% 0px -75% 0px", threshold: 0 });
    headings.forEach(h => observer.observe(h));

    tocLinks.forEach(a => a.addEventListener("click", e => {
      const target = document.getElementById(a.getAttribute("href").slice(1));
      if (target) { e.preventDefault(); target.scrollIntoView({ behavior: "smooth", block: "start" }); }
    }));
  }

  /* ===== 2. 加载并渲染 ===== */
  async function load() {
    if (!docName) {
      stateEl.className = "state err";
      stateEl.textContent = "缺少 doc 参数。请从首页选择一篇文章。";
      return;
    }
    try {
      const res = await fetch("./" + encodeURIComponent(docName));
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const md = await res.text();

      stateEl.style.display = "none";
      contentEl.innerHTML = marked.parse(md);
      buildToc();

      // 标题：取第一个 h1，否则用文件名
      const h1 = contentEl.querySelector("h1");
      const title = h1 ? h1.textContent : docName.replace(/\.md$/, "");
      document.title = title + " · AI Notes";
      crumbEl.textContent = "docs / " + docName;
    } catch (err) {
      stateEl.className = "state err";
      stateEl.innerHTML = `加载失败：${err.message}<br/><small>本地预览请用 HTTP 服务（见 README），线上 GitHub Pages 可直接访问。</small>`;
    }
  }
  load();

  /* ===== 3. 回到顶部 ===== */
  const toTop = document.getElementById("to-top");
  window.addEventListener("scroll", () => {
    toTop.style.display = window.scrollY > 400 ? "block" : "none";
  });
  toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
</script>
</body>
</html>
