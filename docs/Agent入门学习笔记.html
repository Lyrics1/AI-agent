# Agent 入门学习笔记

> 基于 Datawhale 开源教程 [agent-tutorial](https://github.com/datawhalechina/agent-tutorial) 整理
> 学习思路：**先想明白 Agent 是什么、为什么需要它，再动手做一个**

---

## 一句话抓住精髓

> **Agent 不是 ChatGPT 的升级版。ChatGPT 告诉你「怎么做」，而 Agent 会帮你「去做」。**

`Agent` 一词源自拉丁语 `Agere`，意思就是 "to do"（去做）。**「会动手」就是 Agent 区别于普通聊天模型的本质。**

**对比示例（买相机）：**

| 模式 | 行为 |
|------|------|
| ChatGPT | 你问它推荐，它给你一段文字建议，仅此而已 |
| Agent | 去淘宝读完所有评论，总结，给建议，你点头后直接帮你下单 |

---

## 一、为什么需要 Agent？理解 LLM 的「先天残疾」

要理解 Agent 的意义，必须先理解大模型（LLM）的局限。

**问题**：你问 ChatGPT「今天天气怎么样？」「现在几点？」，它答不出来。为什么？

因为 GPT 这类模型的底层是 **自回归语言模型（Autoregressive LM）**：

> 它的全部本领，就是根据前面已有的词，预测下一个最可能的词。输入是文字，输出也是文字。**除了打字，啥也不会。**

由此带来两个先天缺陷：

1. 不能上网；
2. 不知道当前时间 / 天气这类实时信息。

教程的精辟比喻：LLM 是 **「思想的巨人，行动的矮子」**。

> **Agent 就是来给这个「巨人」装上手和脚的。**

---

## 二、Agent 的标准架构（务必记住的公式）

引用 OpenAI 研究员 Lilian Weng 的经典定义，这是整个领域的「通用语言」：

**Agent = LLM + Memory + Planning + Tool use**

| 组成 | 角色 | 干什么 |
|------|------|--------|
| **LLM** | 大脑（中枢） | 思考、决策 |
| **Planning（规划）** | 拆解能力 | 把复杂任务拆成一步步的小任务 |
| **Tool use（工具）** | 手脚 | 调用外部工具（查天气、搜索、下单……） |
| **Memory（记忆）** | 记忆 | 短期：刚才的推理和工具返回值；长期：外部知识库 |

**直观例子（天气 Agent）：**

你说「告诉我广州今天天气，并画一幅图」，Agent 会：

1. **Planning**：拆成两个子任务，查天气 + 画图
2. **Tool use**：分别调用 `高德天气` 工具和 `画图` 工具
3. 汇总结果返回给你

这就是 LLM + Planning + Tool use 三者协作的活样本。

---

## 三、核心机制：LLM 怎么「调用工具」？（最关键）

这是从「听懂概念」到「真正理解原理」的分水岭。

**核心矛盾**：LLM 只会输出文字，那它怎么去「调用一个函数」？

> **答案：事先和 LLM「约法三章」，约定好输出格式，然后用代码去解析它的文字输出。**

### ReAct 范式（Reasoning + Acting，"想"清楚再"行动"）

它约定模型必须按这个格式回复：

- **Thought（思考）**：我现在该干嘛？比如「用户要续费，我得调用续费接口」
- **Action（行动）**：我要调用哪个函数、传什么参数（通常用 JSON 输出）
- **Observation（观察）**：函数执行后的返回结果

### 实战示例（阿里云续费 ECS）

你说：「帮我续费 ECS 实例 i-rj90a7e840y5cde，续费 10 个月」

模型回复（约定用 startofthink / endofthink 标记包裹一段 JSON）：

    好的，我现在帮你调用续费接口
    <|startofthink|>
    {
      "api_name": "RenewInstance",
      "parameters": { "instance_id": "i-rj90a7e840y5cde", "period": 10 }
    }
    <|endofthink|>

**关键洞察**：模型并没有真的执行任何东西，它只是**吐出了一段约定格式的文字**。真正干活的是你的程序：

1. 程序用 `<|startofthink|>` 这种标记定位到 JSON
2. 解析出函数名 `RenewInstance` 和参数
3. **由程序真正调用那个函数**，拿到结果
4. 再把结果（Observation）喂回给模型

> **这就是 Agent 的全部魔法**：LLM 负责「决定调用什么」，外部代码负责「真正执行」，结果再回灌给 LLM，如此循环，直到任务完成。

现代 API 把这套能力封装成了 **Function Calling（函数调用）**，本质就是「约定格式 + 解析执行」的工程化。

## 五、一张图总结整条理解链路

```
LLM「只会说不会做」
      │  缺手脚
      ▼
给它装工具(Tool) + 会拆任务(Planning) + 有记忆(Memory)
      │
      ▼
但 LLM 只能输出文字，怎么调用工具？
      │  约法三章
      ▼
ReAct: Thought -> Action(输出JSON) -> Observation
      │  代码解析并执行
      ▼
循环往复，自主完成复杂任务 = Agent
```

---

## 六、核心要点速记（复习用）

1. Agent 的本质是「会动手」，关键词 `Agere = to do`。
2. LLM 是自回归模型，先天「只会打字」，所以需要 Agent 补上手脚。
3. 标准架构公式：`Agent = LLM + Memory + Planning + Tool use`。
4. LLM 调用工具的秘密：**约定输出格式 + 程序解析执行 + 结果回灌**。
5. ReAct 三段式：`Thought -> Action -> Observation`，循环往复。
6. Function Calling 是这套机制的工程化封装。

---

## 七、深入篇：手把手拆解 ReAct 循环的每一轮

### 约定一个任务

> 用户说：**「查一下北京今天天气，如果下雨就提醒我带伞。」**
> 可用工具：`get_weather(city)`，返回天气文字。

### ReAct 的本质：一段不断「滚雪球」的文本

Agent 没有什么神秘的状态机。ReAct 循环的真相是：

> 每一轮，程序把「**到目前为止的全部历史**」拼成一大段文本喂给 LLM，LLM 续写一小段（Thought + Action），程序执行 Action 得到 Observation，**再把这段追加回历史**，进入下一轮。

这段历史文本，就是后面要讲的**短期记忆**。

### 逐轮追踪

**第 0 轮 · 初始 Prompt**（程序拼给模型，即「约法三章」）：

```
你可以使用以下工具：
- get_weather(city): 查询某城市今天天气

请严格按以下格式循环输出：
Thought: 你的思考
Action: 工具名
Action Input: 工具参数
（然后停下，等待 Observation）

当你能回答用户时，输出：
Thought: 我已经知道答案
Final Answer: 最终回复

用户问题：查一下北京今天天气，如果下雨就提醒我带伞。
```

最后一句「然后停下，等待 Observation」是关键，让模型每次只走一步。

**第 1 轮 · LLM 思考 + 决定行动**，模型续写：

```
Thought: 用户想知道北京天气，并据此决定是否提醒带伞。我需要先查天气。
Action: get_weather
Action Input: 北京
```

程序在检测到 `Action Input` 后**截断**模型输出，然后：

1. 解析出 `Action = get_weather`，`Action Input = 北京`
2. **程序真正调用** `get_weather("北京")`
3. 得到返回 `北京今日小雨，气温 18℃`，包装成一行追加进历史：`Observation: 北京今日小雨，气温 18℃`

**第 2 轮 · 把变大的历史再喂回去**，模型看到小雨，续写：

```
Thought: 天气是小雨，符合下雨条件，应提醒带伞。我已经可以回答了。
Final Answer: 北京今天小雨，气温 18℃，记得带伞出门哦~
```

程序检测到 `Final Answer`，**循环结束**。

### 一张表看懂每轮在干嘛

| 轮次 | LLM 输出（文字） | 程序做的事 | 历史新增 |
|------|----------------|-----------|---------|
| 0 | （无） | 拼初始 Prompt | 任务描述 |
| 1 | Thought + Action: get_weather(北京) | 解析 → 真正调用工具 → 拿到小雨 | + Thought/Action + Observation |
| 2 | Thought + Final Answer | 检测到 Final Answer → 结束 | + 最终回复 |

### 三个最容易忽略的关键点

1. **LLM 从头到尾只做一件事：续写文字。** 它根本不会执行函数，「执行」永远是外部程序干的。
2. **每一轮都是无状态的一次性调用。** LLM 不记得上一轮，是程序靠「把历史全量重发」制造了连续记忆的错觉。
3. **`Action Input` 后必须截断。** 否则模型会自己瞎编 Observation（幻觉出工具结果），全盘乱套。

### 关键点3 展开：「截断」到底是什么意思？

#### 不截断会发生什么（错误示范）

LLM 只会做一件事：根据前文，预测下一个最可能的词，一直续写下去，直到你让它停。**它不知道自己在「扮演 Agent 的大脑」**，它只看到一段文本，然后接着写。

如果不做截断，让 LLM 一口气写完，它会照着模板一路写下去，**自己把 `Observation` 那一行也编出来**：

```
Thought: 用户想知道北京天气，我需要查一下
Action: get_weather
Action Input: 北京
Observation: 北京今天晴，气温 25℃   ← 完全是模型瞎编的！工具根本没被调用
Thought: 天气晴朗，不需要带伞
Final Answer: 北京今天晴天 25℃，不用带伞~
```

**问题**：程序压根没运行 `get_weather("北京")`，25℃ 晴天是 LLM 根据训练数据里「北京天气一般什么样」**猜出来的**。真实天气可能是大雨。这就叫「**幻觉出工具结果**」——模型把自己想象的当成事实写进了 Observation。

#### 正确做法：截断

程序在生成时**实时监控输出**，一旦检测到要写 `Observation`，**立刻让 LLM 停止生成**。

最常用实现：**Stop Token**。调 LLM API 时传一个参数：

```python
response = llm.generate(
    prompt=history,
    stop=["\nObservation:"]   # 一旦模型要写出 Observation，立刻停笔
)
```

这样 LLM 写到 `Action Input: 北京\n` 就被强制停下，**不会**自己续写 Observation。然后程序：

1. 解析出 `Action = get_weather`，`Action Input = 北京`
2. **真正调用** `get_weather("北京")` → 拿到真实数据「小雨 18℃」
3. 把真实结果作为 `Observation: 北京今日小雨 18℃` 追加进历史
4. 把这段更长的历史再喂回 LLM，让它继续写下一个 Thought

#### 一图对比

```
不截断（错误）：
  LLM 一路写到底，自己脑补 Observation
  → 工具根本没调用
  → 答案基于幻觉，可能完全错误

正确截断：
  LLM 写到 Action Input → 强制停
  → 程序解析 → 真正调用工具 → 拿真实结果
  → 把真实 Observation 拼回历史，再喂给 LLM
  → 答案基于真实数据
```

#### 一句话总结

> **「截断」是程序对 LLM 说的一句潜台词：「思考和决定调用什么，你来；但调用本身，别瞎想，让我来。」**

- 不截断 = LLM 既当大脑又自己扮演双手，结果双手是想象的；
- 截断 = LLM 只当大脑，双手交给程序，结果才是真实可信的。

这也是为什么所有 Agent 框架（LangChain / OpenAI Function Calling 等）都把 `stop` 序列设计成核心机制——它是 Agent 不堕入幻觉的**最后一道防线**。

## 八、深入篇：Memory 的长短期机制

### 短期记忆（Short-term Memory）

> 就是上面那段不断滚雪球的历史文本，业界也叫 `scratchpad`（草稿纸）。

- **存在哪**：就在每次发给 LLM 的 prompt 里，本质是内存里的字符串/列表。
- **作用**：让 Agent 记住「这一个任务内」想过什么、调过什么工具、拿到什么结果。
- **致命限制**：受 **上下文窗口** 限制。任务一长就撑爆 token 上限，需要截断或压缩（保留最近 N 轮，或用 LLM 把早期历史总结成一句话）。
- **生命周期**：任务结束就没了，换个对话完全失忆。

### 长期记忆（Long-term Memory）

> 为突破「换对话就失忆」和「上下文装不下」，引入外部存储。

- **存在哪**：外部数据库，最常见是**向量数据库**（FAISS / Milvus / Chroma）。
- **怎么用（RAG 思路）**：
  1. 把历史知识/对话/文档切块，转成向量存进去；
  2. 当前任务来时，把用户问题也转成向量，去库里检索最相关的几条；
  3. 只把这几条相关内容塞进 prompt，而非全部历史。
- **作用**：跨会话记住用户偏好、积累领域知识，且不受单次上下文窗口限制。

### 一图对比

| 维度 | 短期记忆 | 长期记忆 |
|------|---------|---------|
| 载体 | prompt 里的历史文本（scratchpad） | 外部向量数据库 |
| 范围 | 单次任务内 | 跨会话、可持久 |
| 容量 | 受上下文窗口限制 | 近乎无限 |
| 读取方式 | 全量拼接 | 按相关性检索（RAG） |
| 类比 | 工作记忆（刚记的电话号） | 长期记忆（去翻笔记本） |

> **一句话记牢：短期记忆 = 做题时草稿纸上的演算；长期记忆 = 书架上随时能翻的参考书。**

### 串起来：ReAct + Memory 完整闭环

```
用户提问
   │
   ▼
[长期记忆] 检索相关背景，塞进 prompt（可选）
   │
   ▼
┌───────────── ReAct 循环 ─────────────┐
│  把[短期记忆/历史] 全量喂给 LLM        │
│        ▼                              │
│  LLM 续写 Thought + Action            │
│        ▼                              │
│  程序执行工具 → Observation            │
│        ▼                              │
│  Observation 追加进[短期记忆]  ← 滚雪球 │
│        ▼  (没到 Final Answer 就回到顶) │
└───────────────────────────────────────┘
   │ 检测到 Final Answer
   ▼
回复用户 →（可选）把本次对话写入[长期记忆]
```

## 九、深入篇：RAG 是什么？

RAG = **Retrieval-Augmented Generation**（检索增强生成）。它是第八章「长期记忆」最主流的落地方式，也是当下大模型应用最重要的范式之一。

### 一句话定义

> **RAG = 让 LLM 回答问题前，先去外部知识库里查几条最相关的资料，把资料塞进 prompt，再让 LLM 基于这些资料作答。**

简单说就是：**「开卷考试」**。LLM 是考生，知识库是它的参考书。

### 为什么需要 RAG？

LLM 单独使用有四个硬伤，RAG 正好对应解决：

| LLM 的硬伤 | RAG 的解法 |
|-----------|-----------|
| **知识有截止日期**（训练数据到某年某月就停了） | 知识库可以随时更新最新资料 |
| **不懂你的私域知识**（公司内部文档、个人笔记） | 把私域文档放进知识库 |
| **会幻觉**（不知道就瞎编） | 强制基于检索到的资料作答，可追溯出处 |
| **上下文窗口装不下整本书** | 只检索最相关的几段，按需投喂 |

### RAG 的完整流程（两阶段）

#### 阶段一：离线建库（Indexing）

```
原始文档（PDF/Markdown/网页/数据库...）
   │
   ▼ 1) 切块（chunking）：按段落/字数切成几百字的小块
   │
   ▼ 2) 向量化（embedding）：每块文本 → 一个高维浮点数向量
   │   （用 Embedding 模型，比如 text-embedding-3-small）
   │
   ▼ 3) 入库：向量 + 原文 一起存进向量数据库
       （FAISS / Milvus / Chroma / Pinecone...）
```

#### 阶段二：在线问答（Retrieval + Generation）

```
用户问题
   │
   ▼ 1) 把问题也向量化（用同一个 Embedding 模型）
   │
   ▼ 2) 在向量库里做"相似度搜索"
   │    找出最相关的 Top-K 块（K 通常 3~10）
   │
   ▼ 3) 拼 prompt：
   │    "请基于以下资料回答问题：
   │     【资料1】...
   │     【资料2】...
   │     问题：xxx"
   │
   ▼ 4) 喂给 LLM 生成答案
       （可要求模型标注引用了哪条资料）
```

### 一个具体例子

**场景**：你想做一个「公司内部文档问答机器人」。

**离线建库**：把公司的 200 篇 Confluence 文档切成 5000 个小块，每块算出向量，存进 Chroma。

**用户问**：「报销流程是什么？」

1. 把问题向量化 → 得到一个 1536 维的向量
2. 在 Chroma 里搜出 3 条最相似的块：
   - 块A：《报销制度 v3.2》第 2 节「提交流程」
   - 块B：《财务 FAQ》Q17「电子发票要求」
   - 块C：《新员工手册》第 5 章「常用流程」
3. 拼 prompt 喂给 LLM：

   ```
   请基于以下公司资料回答问题：
   【资料1】《报销制度 v3.2》：报销需在月底前提交...
   【资料2】《财务 FAQ》：电子发票需 PDF 格式...
   【资料3】《新员工手册》：报销审批分三级...

   问题：报销流程是什么？
   ```

4. LLM 输出：基于真实文档的准确回答，**且能标明出处**。

### 关键概念解释

**1. Embedding（向量化）**
- 把文字变成一串数字（向量），让"语义相似"变成"向量距离近"
- 例：「猫」和「咪咪」的向量距离会很近，和「火箭」会很远
- 常用模型：OpenAI `text-embedding-3-*`、BGE、M3E

**2. 向量数据库**
- 专门存向量并支持「快速找最相似的 Top-K」
- 主流：FAISS（Meta，本地用）、Milvus、Chroma、Pinecone、Qdrant

**3. Chunking（切块）**
- 太小：语义不完整；太大：检索不精准、超出 LLM 上下文
- 经验值：每块 200~800 字，相邻块重叠 10~20% 防止语义被切断

**4. Top-K**
- 检索时返回最相关的 K 条。K 太小漏召回，太大引入噪声
- 经验值：3~10

### RAG 在 Agent 体系中的位置

回到第八章那张闭环图：

```
用户提问
   │
   ▼
[长期记忆 = RAG 检索] ← 这里就是 RAG！
   │ 查到相关资料塞进 prompt
   ▼
ReAct 循环（短期记忆 scratchpad）
   │
   ▼
最终回复
```

**所以两条线索清晰了**：
- **短期记忆** = ReAct 的 scratchpad（任务内）
- **长期记忆** = RAG 的向量库（跨会话、跨任务）

### RAG vs 微调（Fine-tuning）

经常有人问：要让 LLM 懂私域知识，是 RAG 好还是微调好？

| 维度 | RAG | 微调 |
|------|-----|------|
| 知识更新 | 改库就行，秒级 | 重新训练，慢且贵 |
| 成本 | 低 | 高（GPU 训练） |
| 可追溯 | 能给出处 | 黑盒 |
| 适合场景 | 事实性知识、频繁变化 | 风格、领域语气、固定能力 |
| 一句话 | **教模型"去哪查"** | **教模型"记住"** |

> **业界共识**：绝大多数私域知识问答场景，先 RAG，不行再考虑微调。

### RAG 的进阶变体（了解即可）

- **Multi-query RAG**：把原问题改写成多个变体一起检索，提高召回
- **Hybrid Search**：向量检索 + 关键词检索（BM25）结合，兼顾语义和精确匹配
- **Rerank**：先粗排 Top-50，再用更强的模型精排出 Top-5，提高准度
- **GraphRAG**：用知识图谱组织检索结果，处理多跳推理
- **Agentic RAG**：让 Agent 自己决定「要不要查、查几次、查什么」（RAG 反过来成了 Agent 的一个工具）

### 一句话记牢

> **RAG = 让 LLM 开卷考试。Embedding 是把书做成可搜索的，向量库是图书馆，检索是翻书，生成是基于书本作答。**

  /* ===== 1. 渲染 Markdown ===== */
  const md = document.getElementById("md-source").textContent;
  marked.setOptions({
    breaks: false,
    gfm: true,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });
  const contentEl = document.getElementById("content");
  contentEl.innerHTML = marked.parse(md);

  /* ===== 2. 给所有标题加 id，构建目录 ===== */
  const slugCount = {};
  function slugify(text) {
    let s = text.trim().toLowerCase()
      .replace(/[\s\u3000]+/g, "-")
      .replace(/[^\w\u4e00-\u9fa5\-]/g, "");
    if (slugCount[s] !== undefined) {
      slugCount[s]++;
      s = `${s}-${slugCount[s]}`;
    } else {
      slugCount[s] = 0;
    }
    return s;
  }

  const headings = contentEl.querySelectorAll("h2, h3, h4");
  const tocEl = document.getElementById("toc");
  headings.forEach(h => {
    const id = slugify(h.textContent);
    h.id = id;
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = `#${id}`;
    a.textContent = h.textContent;
    a.className = `lv-${h.tagName.charAt(1)}`;
    li.appendChild(a);
    tocEl.appendChild(li);
  });

  /* ===== 3. 滚动高亮当前章节 ===== */
  const tocLinks = tocEl.querySelectorAll("a");
  const idToLink = {};
  tocLinks.forEach(a => idToLink[a.getAttribute("href").slice(1)] = a);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const link = idToLink[entry.target.id];
      if (!link) return;
      if (entry.isIntersecting) {
        tocLinks.forEach(l => l.classList.remove("active"));
        link.classList.add("active");
      }
    });
  }, { rootMargin: "-20% 0px -75% 0px", threshold: 0 });

  headings.forEach(h => observer.observe(h));

  /* ===== 4. 回到顶部按钮 ===== */
  const toTop = document.getElementById("to-top");
  window.addEventListener("scroll", () => {
    toTop.style.display = window.scrollY > 400 ? "block" : "none";
  });
  toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  /* ===== 5. 平滑滚动 ===== */
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener("click", e => {
      const target = document.getElementById(a.getAttribute("href").slice(1));
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });
  });
</script>
